<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h2>Sign Up</h2>
            <form>
                <div class="row">
                    <input type="text"  placeholder="First Name" id="firstname" name="firstname">
                    <input type="text" placeholder="Last Name" id="lastname" name="lastname">
                </div>
                <input type="text" placeholder="Mobile No." id="mobileno" name="mobileno">
                <input type="email" placeholder="Email Address" id="emailaddress" name="emailaddress">
                <div class="row">
                    <input type="password" placeholder="Password" id="password" name="password">
                    <input type="password" placeholder="Confirm Password" id="confirmpassword" name="confirmpassword">
                </div>
                <div class="agree-statement">
                    <div class="agree-check">
                        <input type="checkbox" id="agree" name="agree">
                        <label for="agree">I Agree</label>
                    </div>
                    <p>By clicking <span>Register</span>, you agree to the <a href="#">Terms and Conditions</a> set out by this site, including our Cookie Use.</p>
                </div>
                <div class="row btn-row">
                    <button type="submit" class="btn-register">Register</button>
                    <button type="submit" class="btn-signin">Sign In</button>
                </div>
            </form>
        </div>
    </body>
</html>
